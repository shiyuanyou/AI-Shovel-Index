name: Daily AI Shovel Index

on:
  schedule:
    # UTC 02:00 daily → Beijing time 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "pipeline"
        type: choice
        options:
          - pipeline
          - smoke
      date:
        description: "Override date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: write   # needed to commit data/index.db back to repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── Local virtualenv + Python dependencies ─────────────────────────
      - name: Create project virtualenv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      # ── Playwright system deps + browser ────────────────────────────────
      - name: Install Playwright system dependencies
        run: .venv/bin/python3 -m playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: .venv/bin/playwright install chromium

      # ── Run pipeline or smoke test ──────────────────────────────────────
      - name: Run daily pipeline
        run: |
          MODE="${{ github.event.inputs.mode || 'pipeline' }}"
          if [ "$MODE" = "smoke" ]; then
            .venv/bin/python3 smoke_test.py
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            .venv/bin/python3 run_daily.py --date "${{ github.event.inputs.date }}"
          else
            .venv/bin/python3 run_daily.py
          fi

      # ── Upload output as artifact ────────────────────────────────────────
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: output/
          retention-days: 30

      # ── Commit data/index.db back to repo ────────────────────────────────
      # This preserves the historical crawl data across runs.
      - name: Commit updated DB
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'smoke' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.db
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update index.db [skip ci]"
          git push
