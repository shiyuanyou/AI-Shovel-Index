name: Daily AI Shovel Index

on:
  schedule:
    # UTC 02:00 daily → Beijing time 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: write   # needed to commit data/index.db back to repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── Python dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      # ── Node.js + Tailwind CSS build ────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      # ── Playwright system deps + browser ────────────────────────────────
      - name: Install Playwright system dependencies
        run: python -m playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: python -m playwright install chromium

      # ── Run pipeline ────────────────────────────────────────────────────
      - name: Run daily pipeline
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python run_daily.py --date "${{ github.event.inputs.date }}"
          else
            python run_daily.py
          fi

      # ── Upload output as artifact ────────────────────────────────────────
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: output/
          retention-days: 30

      # ── Commit data/index.db back to repo ────────────────────────────────
      # This preserves the historical crawl data across runs.
      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.db
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update index.db [skip ci]"
          git push
