<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  background: #111108;
  font-family: "SF Pro Display", "Helvetica Neue", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  color: #ffffff;
  overflow: hidden;
  position: relative;
}

.bg-glow {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  border-radius: 50%;
  opacity: 0.08;
  filter: blur(100px);
  pointer-events: none;
}

.card {
  position: relative;
  width: 1080px;
  height: 1080px;
  display: flex;
  flex-direction: column;
  padding: 56px 80px 52px;
}

/* ── HEADER ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
  margin-bottom: 52px;
}

.brand-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #888880;
  text-transform: uppercase;
}

.brand-date {
  font-size: 13px;
  letter-spacing: 0.08em;
  color: #555550;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 999px;
  border: 1px solid;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: #555550;
  text-transform: uppercase;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.section-sub {
  font-size: 13px;
  color: #333330;
  letter-spacing: 0.06em;
  margin-bottom: 44px;
  flex-shrink: 0;
}

/* ── KEYWORD LIST ── */
.kw-list {
  flex: 1;
  list-style: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.kw-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.kw-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.kw-name {
  font-size: 38px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.01em;
  line-height: 1;
}

.kw-pct {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.kw-delta-abs {
  font-size: 14px;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
}

.bar-track {
  width: 100%;
  height: 3px;
  background: #2a2a22;
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  min-width: 4px;
}

/* empty state */
.empty-msg {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #444440;
  letter-spacing: 0.04em;
}

/* ── FOOTER ── */
.footer {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 40px;
}

.footer-tagline {
  font-size: 18px;
  color: #666660;
  letter-spacing: 0.06em;
}

.footer-handle {
  font-size: 21px;
  color: #888880;
  font-weight: 600;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

  <div class="bg-glow" style="background: {{ accent_color }};"></div>

  <div class="card">

    <!-- ── HEADER ── -->
    <header class="header">
      <div>
        <p class="brand-name">AI Shovel Index</p>
        <p class="brand-date">{{ date }}</p>
      </div>
      <div class="status-pill"
           style="border-color: {{ accent_color }}40; background: {{ accent_color }}0d;">
        <span class="status-dot" style="background: {{ accent_color }};"></span>
        <span class="status-text" style="color: {{ accent_color }};">{{ status_raw }}</span>
      </div>
    </header>

    <!-- ── SECTION LABEL ── -->
    <p class="section-label">今日信号</p>
    <p class="section-sub">今日 vs 昨日 — 各关键词商品数量变化</p>

    <!-- ── KEYWORD LIST ── -->
    {% if daily_rankings %}
    <ul class="kw-list">
      {% for entry in daily_rankings %}
      <li class="kw-row">
        <div class="kw-meta">
          <span class="kw-name">{{ entry.keyword }}</span>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
            <span class="kw-pct" style="color: {{ entry.pct_color }};">{{ entry.pct_str }}</span>
            <span class="kw-delta-abs" style="color: #444440;">{{ entry.delta_str }}</span>
          </div>
        </div>
        <div class="bar-track">
          <div class="bar-fill"
               style="width: {{ entry.bar_pct }}%; background: {{ entry.pct_color }};"></div>
        </div>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <div class="empty-msg">暂无昨日对比数据</div>
    {% endif %}

    <!-- ── FOOTER ── -->
    <footer class="footer">
      <p class="footer-tagline">通过教程需求追踪 AI 投机热度</p>
      <p class="footer-handle">{{ author_handle }}</p>
    </footer>

  </div>

</body>
</html>
