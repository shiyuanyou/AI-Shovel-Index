<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  background: #111108;
  font-family: "SF Pro Display", "Helvetica Neue", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  color: #ffffff;
  overflow: hidden;
  position: relative;
}

/* 仪表盘背后的径向光晕 */
.bg-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(120px);
  pointer-events: none;
}

/* 整张卡片：绝对定位容器 */
.card {
  position: relative;
  width: 1080px;
  height: 1080px;
}

/* ── 顶部标题栏：固定在顶部 ── */
.header {
  position: absolute;
  top: 56px;
  left: 64px;
  right: 64px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.brand-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #888880;
  text-transform: uppercase;
}

.brand-date {
  font-size: 13px;
  letter-spacing: 0.08em;
  color: #555550;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}

/* 状态胶囊标签 */
.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 999px;
  border: 1px solid;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ── 仪表盘组：绝对定位在画面正中 ── */
.gauge-section {
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.gauge-svg {
  display: block;
  overflow: visible;
}

/* 底轨：完整半圆 */
.gauge-track {
  fill: none;
  stroke: #2a2a22;
  stroke-width: 28;
  stroke-linecap: round;
}

/* 填充弧：强调色 */
.gauge-fill {
  fill: none;
  stroke-width: 28;
  stroke-linecap: round;
}

/* 指数大数字 */
.gauge-number {
  font-size: 220px;
  font-weight: 800;
  fill: #ffffff;
  text-anchor: middle;
  dominant-baseline: auto;
  letter-spacing: -0.04em;
  font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
}

/* 阶段标签 */
.gauge-phase {
  font-size: 26px;
  font-weight: 400;
  fill: #888880;
  text-anchor: middle;
  letter-spacing: 0.08em;
  font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
}

/* 周变化量 */
.week-delta {
  margin-top: 32px;
  font-size: 36px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
}

/* 冷启动提示 */
.warming-note {
  margin-top: 24px;
  font-size: 20px;
  color: #666660;
  text-align: center;
  letter-spacing: 0.04em;
}

/* ── 底部页脚：固定在底部 ── */
.footer {
  position: absolute;
  bottom: 52px;
  left: 64px;
  right: 64px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.footer-tagline {
  font-size: 18px;
  color: #666660;
  letter-spacing: 0.06em;
}

.footer-handle {
  font-size: 21px;
  color: #888880;
  font-weight: 600;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

  <div class="bg-glow" style="background: {{ accent_color }};"></div>

  <div class="card">

    <!-- ── 顶部标题栏 ── -->
    <header class="header">
      <div>
        <p class="brand-name">AI 铲子指数（AI SHOVEL INDEX）</p>
        <p class="brand-date">{{ date }}</p>
      </div>
      <div class="status-pill"
           style="border-color: {{ accent_color }}40; background: {{ accent_color }}0d;">
        <span class="status-dot" style="background: {{ accent_color }};"></span>
        <span class="status-text" style="color: {{ accent_color }};">{{ status_raw }}</span>
      </div>
    </header>

    <!-- ── 仪表盘（绝对居中）──
         SVG viewBox: 0 0 1080 560
         圆心: cx=540, cy=340；半径: r=240
         弧端点: M 300 340  A 240 240 0 0 1 780 340
         数字 baseline 在圆心下方，弧线在上方形成罩住效果
    -->
    <section class="gauge-section">
      <svg class="gauge-svg"
           width="1080" height="440"
           viewBox="0 86 1080 440"
           xmlns="http://www.w3.org/2000/svg">

        <!-- 底轨 -->
        <path class="gauge-track"
              d="M 300 340 A 240 240 0 0 1 780 340"
              pathLength="{{ gauge_circumference }}" />

        <!-- 填充弧 -->
        <path class="gauge-fill"
              d="M 300 340 A 240 240 0 0 1 780 340"
              stroke="{{ accent_color }}"
              pathLength="{{ gauge_circumference }}"
              stroke-dasharray="{{ gauge_circumference }}"
              stroke-dashoffset="{{ arc_offset }}" />

        <!-- 指数大数字：坐在圆心下方 -->
        <text class="gauge-number" x="540" y="430">{{ index_int }}</text>

        <!-- 阶段标签 -->
        <text class="gauge-phase" x="540" y="496">{{ phase_label }}</text>

      </svg>

      <!-- 周变化量 -->
      {% if not warming_up %}
      <p class="week-delta" style="color: {{ delta_color }};">{{ delta_str }} 本周</p>
      {% endif %}

      <!-- 冷启动提示 -->
      {% if warming_up %}
      <p class="warming-note">数据积累中 — 不足 7 天</p>
      {% endif %}
    </section>

    <!-- ── 底部页脚 ── -->
    <footer class="footer">
      <p class="footer-tagline">通过社媒和二手平台追踪AI卖铲子热度</p>
      <p class="footer-handle">{{ author_handle }}</p>
    </footer>

  </div>

</body>
</html>
